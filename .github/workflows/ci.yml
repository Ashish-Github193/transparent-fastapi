name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run pytest -v

  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fastapi-floor
            spec: "fastapi==0.75.*"
            allow-fail: false
          - name: fastapi-latest
            spec: "fastapi"
            allow-fail: false
          - name: fastapi-pre
            spec: "fastapi"
            extra-args: "--prerelease=allow"
            allow-fail: true
    continue-on-error: ${{ matrix.allow-fail }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-groups
      - name: Override fastapi (${{ matrix.name }})
        run: uv pip install ${{ matrix.extra-args }} --upgrade "${{ matrix.spec }}"
      - run: uv run --no-sync pytest -v

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Export production dependencies
        run: uv export --no-dev --frozen --no-emit-project --no-hashes -o prod-requirements.txt
      - name: Scan production dependencies for CVEs
        run: uvx pip-audit --requirement prod-requirements.txt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv build
      - run: uvx twine check dist/*
      - name: Install wheel into clean venv and import
        run: |
          uv venv /tmp/check
          uv pip install --python /tmp/check/bin/python dist/*.whl
          /tmp/check/bin/python -c "import transparent_fastapi; from transparent_fastapi import install; assert transparent_fastapi.__version__, 'no __version__'"

  ci-success:
    # Aggregate gate for branch protection: one check name to require instead
    # of pinning matrix-derived names that change when matrix specs change.
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, compat, audit, build]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.compat.result }}" != "success" ] || \
             [ "${{ needs.audit.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more required jobs failed or were skipped"
            exit 1
          fi
