name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(uv run --no-sync python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match pyproject version $PKG_VERSION"
            exit 1
          fi

      - run: uv build
      - run: uvx twine check dist/*

      - name: Install wheel into clean venv and import
        run: |
          uv venv /tmp/check
          uv pip install --python /tmp/check/bin/python dist/*.whl
          /tmp/check/bin/python -c "import transparent_fastapi; from transparent_fastapi import install; assert transparent_fastapi.__version__, 'no __version__'"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/transparent-fastapi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section for this version
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Pull lines between `## [VERSION]` and the next `## [` heading.
          NOTES=$(awk -v ver="$VERSION" '
            /^\[.+\]:/ { if (in_section) exit }
            /^## \[/ {
              if (in_section) exit
              if (index($0, "## [" ver "]") == 1) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md)
          if [ -z "$(printf "%s" "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::no changelog section found for v$VERSION"
            exit 1
          fi
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.notes.outputs.body }}" \
            dist/*
