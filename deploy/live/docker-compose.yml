name: transparent-fastapi-live

services:
  app:
    build:
      context: ../..
      dockerfile: src/test_server/Dockerfile
      target: live-build
      args:
        TFA_VERSION: "${TFA_VERSION:-0.1.2}"
    image: "transparent-fastapi-app:live-${TFA_VERSION:-0.1.2}"
    container_name: tfa-live-app
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: tfa-live-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: tfa-live-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  grafana-mcp:
    image: mcp/grafana@sha256:a91519a83ede741a287eab366da14b3e31ec7c2cd9c40c2beecf8e01ed46ebf0
    profiles: ["tools"]
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USERNAME: admin
      GRAFANA_PASSWORD: admin
    command: ["-t", "stdio"]
    depends_on:
      - grafana

volumes:
  prometheus-data:
  grafana-data:
